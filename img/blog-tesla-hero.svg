<svg width="960" height="400" viewBox="0 0 960 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#1D6B4E"/>
    </linearGradient>
    <linearGradient id="car" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2a3a"/>
      <stop offset="100%" stop-color="#0d1820"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="960" height="400" fill="url(#bg)"/>

  <!-- Grid texture -->
  <defs><pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0L0 0 0 40" fill="none" stroke="#fff" stroke-width="0.2" opacity="0.05"/></pattern></defs>
  <rect width="960" height="400" fill="url(#grid)"/>

  <!-- Stars -->
  <circle cx="50" cy="30" r="1" fill="#fff" opacity="0.7"/>
  <circle cx="120" cy="55" r="1.3" fill="#fff" opacity="0.6"/>
  <circle cx="200" cy="20" r="0.8" fill="#fff" opacity="0.8"/>
  <circle cx="300" cy="45" r="1.1" fill="#fff" opacity="0.6"/>
  <circle cx="780" cy="25" r="1" fill="#fff" opacity="0.7"/>
  <circle cx="860" cy="50" r="1.4" fill="#fff" opacity="0.5"/>
  <circle cx="920" cy="30" r="0.9" fill="#fff" opacity="0.7"/>

  <!-- Tesla Model Y silhouette (left) -->
  <g transform="translate(40, 180)">
    <ellipse cx="220" cy="148" rx="210" ry="12" fill="#000" opacity="0.3"/>
    <rect x="20" y="75" width="400" height="65" rx="10" fill="url(#car)" stroke="#1D6B4E" stroke-width="1.5"/>
    <path d="M75 75 C90 32 135 16 205 16 C275 16 345 32 365 75Z" fill="url(#car)" stroke="#1D6B4E" stroke-width="1.5"/>
    <path d="M88 73 C100 38 132 28 205 28 C278 28 310 38 352 73Z" fill="#0a2535" opacity="0.8"/>
    <circle cx="75" cy="140" r="38" fill="#111" stroke="#1D6B4E" stroke-width="1.5"/>
    <circle cx="75" cy="140" r="22" fill="#1a1a1a"/>
    <circle cx="75" cy="140" r="7" fill="#2DA06F"/>
    <circle cx="355" cy="140" r="38" fill="#111" stroke="#1D6B4E" stroke-width="1.5"/>
    <circle cx="355" cy="140" r="22" fill="#1a1a1a"/>
    <circle cx="355" cy="140" r="7" fill="#2DA06F"/>
    <!-- Out of stock badge on car -->
    <rect x="130" y="42" width="110" height="28" rx="6" fill="#C94E26"/>
    <text x="185" y="61" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#fff">OUT OF STOCK</text>
    <!-- X mark -->
    <circle cx="405" cy="55" r="18" fill="#C94E26" opacity="0.9"/>
    <line x1="396" y1="46" x2="414" y2="64" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="414" y1="46" x2="396" y2="64" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Arrow pointing right -->
  <g transform="translate(490,245)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#2DA06F" stroke-width="3" stroke-linecap="round"/>
    <polygon points="60,0 44,-10 44,10" fill="#2DA06F"/>
  </g>

  <!-- Alternative mattresses (right side) -->
  <g transform="translate(580, 140)">
    <!-- Mattress stack 1 -->
    <rect x="0" y="60" width="140" height="22" rx="5" fill="#2DA06F" opacity="0.9"/>
    <rect x="4" y="56" width="132" height="22" rx="5" fill="#1a8a5a" opacity="0.7"/>
    <rect x="8" y="52" width="124" height="22" rx="5" fill="#1D6B4E" opacity="0.5"/>
    <text x="70" y="75" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#fff">Luno AIR Pro</text>

    <!-- Mattress stack 2 -->
    <rect x="160" y="80" width="140" height="22" rx="5" fill="#2DA06F" opacity="0.9"/>
    <rect x="164" y="76" width="132" height="22" rx="5" fill="#1a8a5a" opacity="0.7"/>
    <text x="230" y="95" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#fff">MondoKing 3D</text>

    <!-- Mattress stack 3 -->
    <rect x="80" y="120" width="140" height="22" rx="5" fill="#2DA06F" opacity="0.9"/>
    <rect x="84" y="116" width="132" height="22" rx="5" fill="#1a8a5a" opacity="0.7"/>
    <text x="150" y="135" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#fff">Exped MegaMat</text>

    <!-- Check marks -->
    <circle cx="140" cy="71" r="10" fill="#fff" opacity="0.9"/>
    <polyline points="134,71 138,76 146,65" fill="none" stroke="#1D6B4E" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="300" cy="91" r="10" fill="#fff" opacity="0.9"/>
    <polyline points="294,91 298,96 306,85" fill="none" stroke="#1D6B4E" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="220" cy="131" r="10" fill="#fff" opacity="0.9"/>
    <polyline points="214,131 218,136 226,125" fill="none" stroke="#1D6B4E" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Article title text -->
  <text x="480" y="58" text-anchor="middle" font-family="Georgia,serif" font-size="28" font-weight="700" fill="#fff">Tesla Model Y Mattress Out of Stock?</text>
  <text x="480" y="90" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" fill="#2DA06F">Here Are the Best Alternatives</text>
  <line x1="200" y1="108" x2="760" y2="108" stroke="#1D6B4E" stroke-width="0.5" opacity="0.5"/>

  <!-- Brand tag -->
  <text x="480" y="385" text-anchor="middle" font-family="Georgia,serif" font-size="13" fill="#2DA06F" opacity="0.7" font-weight="700">sleepinmyev.com</text>
</svg>
