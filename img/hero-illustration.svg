<svg width="1200" height="500" viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="70%" stop-color="#1a3a4a"/>
      <stop offset="100%" stop-color="#1D6B4E"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1D6B4E"/>
      <stop offset="100%" stop-color="#0f3d26"/>
    </linearGradient>
    <linearGradient id="car-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2a3a"/>
      <stop offset="100%" stop-color="#0d1820"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="soft-glow"><feGaussianBlur stdDeviation="8" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="1200" height="500" fill="url(#sky)"/>

  <!-- Stars -->
  <circle cx="80" cy="40" r="1.2" fill="#fff"/><circle cx="145" cy="25" r="0.8" fill="#fff"/>
  <circle cx="200" cy="55" r="1.5" fill="#fff"/><circle cx="270" cy="30" r="1" fill="#fff"/>
  <circle cx="320" cy="15" r="1.8" fill="#fff"/><circle cx="390" cy="45" r="0.9" fill="#fff"/>
  <circle cx="450" cy="20" r="1.3" fill="#fff"/><circle cx="520" cy="35" r="0.7" fill="#fff"/>
  <circle cx="590" cy="10" r="1.6" fill="#fff"/><circle cx="650" cy="50" r="1" fill="#fff"/>
  <circle cx="720" cy="22" r="1.4" fill="#fff"/><circle cx="780" cy="38" r="0.8" fill="#fff"/>
  <circle cx="850" cy="12" r="1.2" fill="#fff"/><circle cx="920" cy="42" r="1.7" fill="#fff"/>
  <circle cx="980" cy="28" r="0.9" fill="#fff"/><circle cx="1040" cy="55" r="1.1" fill="#fff"/>
  <circle cx="1100" cy="18" r="1.5" fill="#fff"/><circle cx="1160" cy="44" r="0.8" fill="#fff"/>
  <circle cx="110" cy="80" r="0.7" fill="#fff" opacity="0.6"/><circle cx="360" cy="70" r="1" fill="#fff" opacity="0.7"/>
  <circle cx="680" cy="75" r="0.8" fill="#fff" opacity="0.6"/><circle cx="900" cy="68" r="1.2" fill="#fff" opacity="0.8"/>

  <!-- Moon -->
  <path d="M1080 60 C1068 72 1064 92 1072 110 C1050 102 1042 80 1052 60 C1060 44 1078 38 1094 44 C1088 47 1081 53 1080 60Z" fill="#f5e642" opacity="0.9" filter="url(#soft-glow)"/>

  <!-- Mountains -->
  <polygon points="0,280 180,140 360,280" fill="#0f2d1e" opacity="0.7"/>
  <polygon points="200,280 420,110 640,280" fill="#0d2518" opacity="0.8"/>
  <polygon points="500,280 750,90 1000,280" fill="#0f2d1e" opacity="0.7"/>
  <polygon points="800,280 1050,130 1200,280" fill="#0d2518" opacity="0.8"/>

  <!-- Ground -->
  <rect x="0" y="340" width="1200" height="160" fill="url(#ground)"/>
  <ellipse cx="600" cy="340" rx="620" ry="18" fill="#1a5a3a" opacity="0.6"/>

  <!-- Trees left -->
  <rect x="60" y="270" width="8" height="80" fill="#0d2010"/>
  <polygon points="64,180 30,290 98,290" fill="#0f3020"/>
  <polygon points="64,210 26,300 102,300" fill="#0d2818"/>
  <rect x="130" y="290" width="6" height="60" fill="#0d2010"/>
  <polygon points="133,220 108,300 158,300" fill="#0f3020"/>

  <!-- Trees right -->
  <rect x="1100" y="275" width="8" height="75" fill="#0d2010"/>
  <polygon points="1104,185 1070,285 1138,285" fill="#0f3020"/>
  <polygon points="1104,215 1066,295 1142,295" fill="#0d2818"/>
  <rect x="1150" y="295" width="6" height="55" fill="#0d2010"/>
  <polygon points="1153,230 1128,305 1178,305" fill="#0f3020"/>

  <!-- EV (Tesla Model Y style, centered) -->
  <g transform="translate(280,240)">
    <ellipse cx="310" cy="175" rx="290" ry="16" fill="#000" opacity="0.35"/>
    <rect x="30" y="90" width="560" height="75" rx="12" fill="url(#car-body)" stroke="#1D6B4E" stroke-width="1.5"/>
    <path d="M100 90 C118 38 175 20 270 20 C365 20 455 38 500 90Z" fill="url(#car-body)" stroke="#1D6B4E" stroke-width="1.5"/>
    <path d="M118 88 C132 46 172 34 270 34 C368 34 408 46 482 88Z" fill="#0a2535" opacity="0.9"/>
    <line x1="270" y1="36" x2="276" y2="88" stroke="#1D6B4E" stroke-width="1" opacity="0.5"/>
    <!-- Open hatch -->
    <path d="M500 88 L560 88 L560 30 C530 15 505 20 500 38Z" fill="#0d1820" stroke="#1D6B4E" stroke-width="1.5"/>
    <!-- Interior warm glow -->
    <ellipse cx="540" cy="100" rx="38" ry="22" fill="#f5c842" opacity="0.12" filter="url(#soft-glow)"/>
    <!-- Mattress visible inside -->
    <rect x="280" y="78" width="218" height="14" rx="4" fill="#2DA06F" opacity="0.55"/>
    <!-- Pillow -->
    <ellipse cx="310" cy="82" rx="22" ry="8" fill="#C94E26" opacity="0.45"/>
    <!-- Legs sticking out -->
    <rect x="548" y="90" width="18" height="7" rx="3" fill="#2a3a2a" opacity="0.9"/>
    <ellipse cx="566" cy="94" rx="6" ry="4" fill="#C94E26" opacity="0.75"/>
    <!-- Charge port glow -->
    <circle cx="48" cy="130" r="5" fill="#C94E26" opacity="0.8" filter="url(#glow)"/>
    <circle cx="48" cy="130" r="10" fill="#C94E26" opacity="0.15"/>
    <!-- Wheels -->
    <circle cx="110" cy="165" r="52" fill="#111" stroke="#2DA06F" stroke-width="2"/>
    <circle cx="110" cy="165" r="32" fill="#1a1a1a"/>
    <circle cx="110" cy="165" r="10" fill="#2DA06F"/>
    <circle cx="490" cy="165" r="52" fill="#111" stroke="#2DA06F" stroke-width="2"/>
    <circle cx="490" cy="165" r="32" fill="#1a1a1a"/>
    <circle cx="490" cy="165" r="10" fill="#2DA06F"/>
    <!-- Camp light inside -->
    <circle cx="420" cy="74" r="6" fill="#f5c842" opacity="0.4"/>
    <circle cx="420" cy="74" r="14" fill="#f5c842" opacity="0.08" filter="url(#soft-glow)"/>
    <!-- Z Z Z -->
    <text x="575" y="68" font-family="Georgia,serif" font-size="22" fill="#2DA06F" opacity="0.65" font-weight="700">z</text>
    <text x="598" y="50" font-family="Georgia,serif" font-size="16" fill="#2DA06F" opacity="0.45" font-weight="700">z</text>
    <text x="614" y="36" font-family="Georgia,serif" font-size="12" fill="#2DA06F" opacity="0.28" font-weight="700">z</text>
  </g>

  <!-- Campfire -->
  <g transform="translate(960,330)">
    <ellipse cx="25" cy="24" rx="20" ry="6" fill="#1a0a00" opacity="0.5"/>
    <line x1="8" y1="20" x2="42" y2="22" stroke="#3d1a00" stroke-width="4" stroke-linecap="round"/>
    <line x1="12" y1="22" x2="38" y2="18" stroke="#2d1200" stroke-width="3" stroke-linecap="round"/>
    <path d="M20 18 C17 10 13 2 19 -5 C21 2 25 8 23 18Z" fill="#ff8c00" opacity="0.9"/>
    <path d="M25 18 C23 8 27 0 30 -8 C33 0 31 10 27 18Z" fill="#ff6a00" opacity="0.85"/>
    <path d="M22 18 C19 6 23 -2 25 -10 C28 -2 27 8 25 18Z" fill="#ffb700" opacity="0.7"/>
    <ellipse cx="25" cy="14" rx="22" ry="14" fill="#ff8c00" opacity="0.07" filter="url(#soft-glow)"/>
  </g>

  <!-- Shooting star -->
  <line x1="700" y1="32" x2="748" y2="64" stroke="#fff" stroke-width="1.5" opacity="0.65" stroke-linecap="round"/>
  <circle cx="700" cy="32" r="2" fill="#fff" opacity="0.9"/>
</svg>
