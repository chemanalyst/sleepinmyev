<svg width="960" height="400" viewBox="0 0 960 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#1a3a4a"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2DA06F"/>
      <stop offset="100%" stop-color="#1D6B4E"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C94E26"/>
      <stop offset="100%" stop-color="#a33d1e"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="960" height="400" fill="url(#bg)"/>
  <defs><pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0L0 0 0 40" fill="none" stroke="#fff" stroke-width="0.2" opacity="0.04"/></pattern></defs>
  <rect width="960" height="400" fill="url(#grid)"/>

  <!-- Title -->
  <text x="480" y="52" text-anchor="middle" font-family="Georgia,serif" font-size="26" font-weight="700" fill="#fff">How Much Range Do Camping Mattresses Cost?</text>
  <text x="480" y="80" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" fill="#2DA06F">Real numbers. Actual weight. No guesswork.</text>
  <line x1="160" y1="98" x2="800" y2="98" stroke="#1D6B4E" stroke-width="0.5" opacity="0.5"/>

  <!-- Battery icon (left) -->
  <g transform="translate(60, 140)">
    <rect x="0" y="10" width="120" height="60" rx="8" fill="none" stroke="#2DA06F" stroke-width="2.5"/>
    <rect x="120" y="22" width="10" height="36" rx="3" fill="#2DA06F" opacity="0.6"/>
    <!-- Battery fill (showing drain) -->
    <rect x="6" y="16" width="95" height="48" rx="5" fill="#2DA06F" opacity="0.25"/>
    <rect x="6" y="16" width="58" height="48" rx="5" fill="#2DA06F" opacity="0.7"/>
    <!-- Percentage -->
    <text x="60" y="46" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" font-weight="700" fill="#fff">~3%</text>
    <text x="60" y="90" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#2DA06F">per night</text>
    <!-- Label -->
    <text x="60" y="110" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#888">Light mattress (~3 lbs)</text>
  </g>

  <!-- Bar chart (center) -->
  <g transform="translate(230, 110)">
    <!-- Y axis -->
    <line x1="50" y1="0" x2="50" y2="200" stroke="#333" stroke-width="1"/>
    <!-- X axis -->
    <line x1="50" y1="200" x2="450" y2="200" stroke="#333" stroke-width="1"/>

    <!-- Grid lines -->
    <line x1="50" y1="50" x2="450" y2="50" stroke="#333" stroke-width="0.5" stroke-dasharray="4,4" opacity="0.5"/>
    <line x1="50" y1="100" x2="450" y2="100" stroke="#333" stroke-width="0.5" stroke-dasharray="4,4" opacity="0.5"/>
    <line x1="50" y1="150" x2="450" y2="150" stroke="#333" stroke-width="0.5" stroke-dasharray="4,4" opacity="0.5"/>
    <text x="42" y="54" text-anchor="end" font-family="Arial,sans-serif" font-size="10" fill="#666">6%</text>
    <text x="42" y="104" text-anchor="end" font-family="Arial,sans-serif" font-size="10" fill="#666">4%</text>
    <text x="42" y="154" text-anchor="end" font-family="Arial,sans-serif" font-size="10" fill="#666">2%</text>
    <text x="42" y="204" text-anchor="end" font-family="Arial,sans-serif" font-size="10" fill="#666">0%</text>

    <!-- Bars -->
    <!-- 1.5 lbs -->
    <rect x="70" y="185" width="44" height="15" rx="3" fill="url(#bar1)"/>
    <text x="92" y="215" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#888">1.5 lbs</text>
    <text x="92" y="180" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#2DA06F">0.015%</text>

    <!-- 5 lbs -->
    <rect x="140" y="175" width="44" height="25" rx="3" fill="url(#bar1)"/>
    <text x="162" y="215" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#888">5 lbs</text>
    <text x="162" y="170" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#2DA06F">0.05%</text>

    <!-- 10 lbs -->
    <rect x="210" y="158" width="44" height="42" rx="3" fill="url(#bar1)"/>
    <text x="232" y="215" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#888">10 lbs</text>
    <text x="232" y="152" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#2DA06F">0.1%</text>

    <!-- 15 lbs -->
    <rect x="280" y="140" width="44" height="60" rx="3" fill="url(#bar1)" opacity="0.85"/>
    <text x="302" y="215" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#888">15 lbs</text>
    <text x="302" y="134" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#2DA06F">0.15%</text>

    <!-- 22 lbs (accent) -->
    <rect x="350" y="114" width="44" height="86" rx="3" fill="url(#bar2)" opacity="0.9"/>
    <text x="372" y="215" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#888">22 lbs</text>
    <text x="372" y="108" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#C94E26">0.22%</text>

    <!-- Chart title -->
    <text x="250" y="-15" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#aaa">Range Impact by Mattress Weight</text>
    <text x="250" y="-2" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#666">per 100 miles of range</text>
  </g>

  <!-- Key insight callout -->
  <rect x="730" y="140" width="190" height="100" rx="8" fill="#1D6B4E" opacity="0.2"/>
  <rect x="730" y="140" width="190" height="100" rx="8" fill="none" stroke="#1D6B4E" stroke-width="1"/>
  <text x="825" y="168" text-anchor="middle" font-family="Georgia,serif" font-size="13" font-weight="700" fill="#2DA06F">The verdict:</text>
  <text x="825" y="188" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#ccc">Even the heaviest</text>
  <text x="825" y="204" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#ccc">mattress costs less</text>
  <text x="825" y="220" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#ccc">than 0.3% per trip</text>

  <!-- Brand tag -->
  <text x="480" y="385" text-anchor="middle" font-family="Georgia,serif" font-size="13" fill="#2DA06F" opacity="0.7" font-weight="700">sleepinmyev.com</text>
</svg>
