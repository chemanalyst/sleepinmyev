<svg width="960" height="400" viewBox="0 0 960 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="60%" stop-color="#1a3020"/>
      <stop offset="100%" stop-color="#1D6B4E"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5c842"/>
      <stop offset="100%" stop-color="#c49a10"/>
    </linearGradient>
    <linearGradient id="silver" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#aaa"/>
      <stop offset="100%" stop-color="#777"/>
    </linearGradient>
    <linearGradient id="bronze" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cd7f32"/>
      <stop offset="100%" stop-color="#a0622a"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="960" height="400" fill="url(#bg)"/>
  <defs><pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0L0 0 0 40" fill="none" stroke="#fff" stroke-width="0.2" opacity="0.04"/></pattern></defs>
  <rect width="960" height="400" fill="url(#grid)"/>

  <!-- Stars -->
  <circle cx="50" cy="30" r="1" fill="#fff" opacity="0.6"/><circle cx="150" cy="20" r="1.2" fill="#fff" opacity="0.7"/>
  <circle cx="800" cy="25" r="1" fill="#fff" opacity="0.6"/><circle cx="900" cy="40" r="1.3" fill="#fff" opacity="0.5"/>

  <!-- Title -->
  <text x="480" y="50" text-anchor="middle" font-family="Georgia,serif" font-size="27" font-weight="700" fill="#fff">Best EV for Camping in 2026</text>
  <text x="480" y="78" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" fill="#2DA06F">Ranked by verified sleeping dimensions · not just features</text>
  <line x1="120" y1="96" x2="840" y2="96" stroke="#1D6B4E" stroke-width="0.5" opacity="0.5"/>

  <!-- Podium -->
  <!-- 1st place (center, tallest) -->
  <rect x="350" y="220" width="120" height="120" rx="4" fill="url(#gold)" opacity="0.9"/>
  <text x="410" y="215" text-anchor="middle" font-family="Georgia,serif" font-size="22" font-weight="700" fill="#f5c842" filter="url(#glow)">1</text>
  <text x="410" y="248" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#0d1b2a">ID.BUZZ TOURER</text>
  <text x="410" y="262" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#0d1820">87" × 53"</text>
  <text x="410" y="276" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#0d1820">Overnight Mode ✓</text>
  <!-- Trophy -->
  <text x="410" y="310" text-anchor="middle" font-family="Arial,sans-serif" font-size="28">🏕️</text>

  <!-- 2nd place (left) -->
  <rect x="210" y="255" width="120" height="85" rx="4" fill="url(#silver)" opacity="0.85"/>
  <text x="270" y="250" text-anchor="middle" font-family="Georgia,serif" font-size="20" font-weight="700" fill="#ccc">2</text>
  <text x="270" y="280" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#111">RIVIAN R1S</text>
  <text x="270" y="294" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#222">84–85" × 51"</text>
  <text x="270" y="308" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#222">~2% drain/night</text>

  <!-- 3rd place (right) -->
  <rect x="490" y="275" width="120" height="65" rx="4" fill="url(#bronze)" opacity="0.85"/>
  <text x="550" y="270" text-anchor="middle" font-family="Georgia,serif" font-size="20" font-weight="700" fill="#cd7f32">3</text>
  <text x="550" y="296" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#1a0a00">KIA EV9</text>
  <text x="550" y="310" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#1a0a00">81" × 52"</text>
  <text x="550" y="324" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#1a0a00">3.6 kW V2L ✓</text>

  <!-- 4th-7th (right panel) -->
  <g transform="translate(650, 115)">
    <text x="0" y="0" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#888">Also ranked:</text>
    <!-- EV list -->
    <rect x="0" y="12" width="260" height="32" rx="5" fill="#1a2a3a" opacity="0.7"/>
    <text x="10" y="33" font-family="Arial,sans-serif" font-size="11" fill="#aaa">#4</text>
    <text x="30" y="33" font-family="Arial,sans-serif" font-size="11" fill="#fff" font-weight="600">Tesla Model Y</text>
    <text x="180" y="33" font-family="Arial,sans-serif" font-size="10" fill="#2DA06F">76–83" · Camp Mode</text>

    <rect x="0" y="50" width="260" height="32" rx="5" fill="#1a2a3a" opacity="0.6"/>
    <text x="10" y="71" font-family="Arial,sans-serif" font-size="11" fill="#aaa">#5</text>
    <text x="30" y="71" font-family="Arial,sans-serif" font-size="11" fill="#fff" font-weight="600">Hyundai Ioniq 5</text>
    <text x="180" y="71" font-family="Arial,sans-serif" font-size="10" fill="#2DA06F">73" · 1.9kW V2L</text>

    <rect x="0" y="88" width="260" height="32" rx="5" fill="#1a2a3a" opacity="0.5"/>
    <text x="10" y="109" font-family="Arial,sans-serif" font-size="11" fill="#aaa">#6</text>
    <text x="30" y="109" font-family="Arial,sans-serif" font-size="11" fill="#fff" font-weight="600">F-150 Lightning</text>
    <text x="180" y="109" font-family="Arial,sans-serif" font-size="10" fill="#2DA06F">64" bed · 7.2kW</text>

    <rect x="0" y="126" width="260" height="32" rx="5" fill="#1a2a3a" opacity="0.4"/>
    <text x="10" y="147" font-family="Arial,sans-serif" font-size="11" fill="#aaa">#7</text>
    <text x="30" y="147" font-family="Arial,sans-serif" font-size="11" fill="#fff" font-weight="600">VW ID.4</text>
    <text x="180" y="147" font-family="Arial,sans-serif" font-size="10" fill="#C94E26">77" but 37" wide</text>

    <!-- Insight box -->
    <rect x="0" y="172" width="260" height="50" rx="6" fill="#1D6B4E" opacity="0.2"/>
    <rect x="0" y="172" width="260" height="50" rx="6" fill="none" stroke="#1D6B4E" stroke-width="1"/>
    <text x="130" y="192" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#2DA06F" font-weight="700">⚠ Check floor WIDTH at wheel wells</text>
    <text x="130" y="208" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#aaa">not just cargo length</text>
    <text x="130" y="220" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#aaa">— the ID.4 proves it</text>
  </g>

  <!-- Base line -->
  <line x1="190" y1="340" x2="630" y2="340" stroke="#333" stroke-width="1.5"/>

  <!-- Brand tag -->
  <text x="480" y="385" text-anchor="middle" font-family="Georgia,serif" font-size="13" fill="#2DA06F" opacity="0.7" font-weight="700">sleepinmyev.com</text>
</svg>
